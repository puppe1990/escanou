{{ define "feed_confirm_btn" }}
<button
  type="button"
  id="confirm-btn-{{ .ID }}"
  {{ if .Disabled }}disabled{{ else }}{{ hxPost (printf "/feed/%d/confirm" .ID) (printf "#confirm-btn-%d" .ID) }}{{ end }}
  class="mercado-vote-btn mercado-vote-up"
  aria-label="Confirmar preço ({{ .Count }} confirmações)"
>
  {{ template "icon_thumb_up_sm" . }}
  <span class="font-mono">{{ .Count }}</span>
</button>
{{ end }}
