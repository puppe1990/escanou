{{ define "title" }}Mapa de Ofertas — Waze de Supermercados{{ end }}
{{ define "content" }}
<div class="mercado-page-card">
  <div class="mb-4 pb-4 border-b border-slate-100">
    <h2
      class="text-lg font-black tracking-tight text-slate-900 flex items-center gap-2 font-display"
    >
      <svg
        class="w-5 h-5 text-indigo-600"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.243-4.243a8 8 0 1111.314 0z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
        />
      </svg>
      Mapa de Ofertas
    </h2>
    <p class="text-[11px] text-slate-500 font-medium">
      Supermercados com melhores preços perto de você
    </p>
  </div>
  <script type="application/json" id="mercado-map-data">{{ .MapMarkersJSON }}</script>
  <div
    id="mercado-map"
    class="mercado-map aspect-[4/3] sm:aspect-[16/9] rounded-xl border border-slate-200 mb-4"
    role="application"
    aria-label="Mapa de supermercados em São Paulo"
  ></div>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    {{ range .Markets }}
    <div
      class="p-3.5 bg-slate-50 rounded-xl border border-slate-200 hover:border-indigo-200 transition"
    >
      <div class="flex items-start justify-between gap-2">
        <div>
          <h3 class="text-sm font-extrabold text-slate-900">{{ .Name }}</h3>
          <p class="text-[10px] text-slate-500 mt-0.5">{{ .Address }}</p>
        </div>
        <span
          class="text-[10px] font-bold text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded-md flex-shrink-0"
          >{{ .Distance }}</span
        >
      </div>
      <div class="flex items-center justify-between mt-3 pt-3 border-t border-slate-200/60">
        <span class="text-[10px] text-slate-500 font-medium">{{ .Offers }} ofertas ativas</span>
        <span class="text-[10px] font-black text-emerald-700 font-mono">{{ .BestDeal }}</span>
      </div>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
